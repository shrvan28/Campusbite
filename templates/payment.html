<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment | CampusBite</title>

<link rel="stylesheet" href="/static/css/style.css">
<link rel="stylesheet" href="/static/css/payment.css">

</head>

<body>

<nav>
<div class="nav-container">
<a class="logo">Campus<span>Bite</span></a>
<div class="nav-right">
    <a href="/profile" class="profile">👤 {{ user.name }}</a>
</div>
</nav>

<section class="payment-section">
    <div class="payment-card">
        <h2>Checkout</h2>
        <p class="subtitle">Review your payment method and confirm your order</p>

        <form action="/payment" method="POST" id="payment-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="schedule_time" value="{{ schedule_time }}">
            <div class="payment-options">
                <label class="payment-option {% if preselected == 'upi' %}selected-option{% endif %}">
                    <input type="radio" name="payment" value="upi" required {% if preselected == 'upi' %}checked{% endif %}>
                    <i>📱</i>
                    <div class="option-info">
                        <h4>UPI Payment</h4>
                        <p>Google Pay, PhonePe, Paytm</p>
                        {% if preselected == 'upi' and schedule_time %}
                        <span class="schedule-badge">⏰ Pickup at {{ schedule_time }}</span>
                        {% endif %}
                    </div>
                </label>

                <label class="payment-option {% if preselected == 'cod' %}selected-option{% endif %}">
                    <input type="radio" name="payment" value="cod" {% if preselected == 'cod' %}checked{% endif %}>
                    <i>💵</i>
                    <div class="option-info">
                        <h4>Cash on Delivery</h4>
                        <p>Pay when you pick up your order</p>
                        {% if preselected == 'cod' %}
                        <span class="schedule-badge" style="background:#fff3cd; color:#856404;">⚡ No schedule needed</span>
                        {% endif %}
                    </div>
                </label>
            </div>

            <div class="order-total-box">
                <span>Amount to Pay</span>
                <h3>₹{{ "{:,.2f}".format(total) }}</h3>
            </div>

            <button type="submit" class="pay-btn">Confirm & Place Order</button>
        </form>
    </div>
</section>
</body>
</html>
