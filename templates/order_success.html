<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Successful | CampusBite</title>

<link rel="stylesheet" href="/static/css/style.css">
<link rel="stylesheet" href="/static/css/order_success.css">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav>
<div class="nav-container">
<a href="/" class="logo">Campus<span>Bite</span></a>

<div class="nav-menu">
<a href="/">Menu</a>
<a href="/orders">My Orders</a>
</div>

<div class="nav-right">
{% if user %}
<a href="/logout" class="btn-login">Logout</a>
<a href="/profile" class="profile">👤 {{ user.name }}</a>
{% else %}
<a href="/login" class="btn-login">Login</a>
<a href="/register" class="btn-register">Register</a>
{% endif %}
<a href="/cart" class="cart" style="text-decoration:none;">🛒</a>
</div>
</div>
</nav>

<!-- SUCCESS SECTION -->
<section class="success-section">
<div class="success-card">

<div class="success-icon">✅</div>

<h2>Order Placed Successfully!</h2>

<p>Your food is being prepared in the canteen.</p>

<div class="order-info">
<p><strong>Order ID:</strong> #{{ order_id }}</p>
<p><strong>Pickup Time:</strong> 10 minutes</p>
</div>

<a href="/" class="back-btn">Back to Menu</a>

</div>
</section>

</body>
</html>
